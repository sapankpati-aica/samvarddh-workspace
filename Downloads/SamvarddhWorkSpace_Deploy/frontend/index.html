<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#C85B2E;--brand-light:#F5E8E2;--brand-dark:#8B3A18;--nav:#1C1008;--sw:230px;--text:#1a1a1a;--text2:#666;--border:#e2e2e2;--bg:#F4F1EE;--card:#fff;--green:#2d7a2d;--red:#a32d2d;--blue:#1a4f8a;--r:10px;--sh:0 2px 14px rgba(0,0,0,.08)}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1C1008,#3d1f08)}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.ll-circle{width:64px;height:64px;border-radius:50%;background:var(--brand);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff}
.ll-name{font-size:22px;font-weight:800;color:var(--brand);letter-spacing:1px;text-align:center}
.ll-sub{font-size:12px;color:var(--text2);margin-top:2px;text-align:center;margin-bottom:20px}
.login-box label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase}
.login-box input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border .15s;margin-bottom:14px}
.login-box input:focus{border-color:var(--brand)}
.login-err{color:var(--red);font-size:13px;margin-bottom:10px;text-align:center;min-height:18px}
.topnav{background:var(--nav);height:54px;display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:200}
.nav-brand{display:flex;align-items:center;gap:10px;margin-right:auto}
.nav-logo{width:34px;height:34px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:13px;overflow:hidden;flex-shrink:0}
.nav-logo img{width:100%;height:100%;object-fit:cover}
.nav-name{color:#fff;font-size:14px;font-weight:700}
.nav-sub{color:#888;font-size:10px}
.nav-user{color:#ccc;font-size:12px;margin-right:12px}
.app-body{display:flex;min-height:calc(100vh - 54px)}
.sidebar{width:var(--sw);background:var(--nav);padding:12px 0;flex-shrink:0;overflow-y:auto}
.ng{font-size:10px;font-weight:700;color:#555;padding:14px 18px 5px;letter-spacing:1px;text-transform:uppercase}

.ni-ic{width:18px;text-align:center;font-size:15px}
.content{flex:1;overflow:auto;padding:22px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:20px;margin-bottom:16px}
.ct{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--text)}
.ph{margin-bottom:18px}.ph-t{font-size:19px;font-weight:700}.ph-s{font-size:13px;color:var(--text2);margin-top:2px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:20px}
.metric{background:var(--card);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);border-left:4px solid var(--brand)}
.ml{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.mv{font-size:22px;font-weight:800;color:var(--text)}.ms{font-size:11px;color:var(--text2);margin-top:3px}
label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);background:#fff;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand)}
textarea{resize:vertical;min-height:72px}
.fg{margin-bottom:14px}
.fr{display:grid;gap:14px;margin-bottom:14px}
.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.bp{background:var(--brand);color:#fff}.bp:hover{background:var(--brand-dark)}
.bo{background:transparent;border:1.5px solid var(--brand);color:var(--brand)}.bo:hover{background:var(--brand-light)}

.bb{background:#e6f0fa;border:1.5px solid #90b8e0;color:var(--blue)}

.br{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f5f0ec;padding:10px 12px;text-align:left;font-weight:700;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf6f3}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bg{background:#d4f4d4;color:#1a5e1a}.bo2{background:#fee3d4;color:#7a3010}
.bb2{background:#d4e6fa;color:#0a3e7a}.bgr{background:#eee;color:#555}
.br2{background:#fdd;color:#8b0000}.by{background:#fff3cc;color:#7a5c00}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:9px 18px;cursor:pointer;font-size:13px;font-weight:700;color:var(--text2);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--brand)}.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.notif{position:fixed;top:64px;right:18px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:sIn .25s ease;max-width:340px}
.ns{background:#1a4a1a;color:#90ee90;border-left:4px solid #4caf50}
.ne{background:#4a1a1a;color:#ffaaaa;border-left:4px solid #f44}
.nf{background:#1a2a4a;color:#aaccff;border-left:4px solid #4488ff}
@keyframes sIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.inv-box{border:2px solid var(--border);border-radius:var(--r);padding:24px;background:#fff;margin-bottom:16px}
.inv-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:14px;border-bottom:2px solid var(--brand);margin-bottom:16px}
.inv-co{font-size:20px;font-weight:800;color:var(--brand)}.inv-co-sub{font-size:11px;color:var(--text2)}
.inv-title{text-align:right;font-size:17px;font-weight:700}.inv-no{font-size:11px;color:var(--text2);margin-top:3px}
.inv-total{background:var(--brand);color:#fff;padding:12px 18px;border-radius:8px;text-align:right;margin-top:12px}
.inv-tl{font-size:10px;opacity:.8;text-transform:uppercase;letter-spacing:.5px}.inv-tv{font-size:22px;font-weight:800;margin-top:2px}
.terms-box{margin-top:14px;padding:12px;background:#fef9f5;border-radius:8px;border-left:4px solid var(--brand);font-size:12px;color:var(--text2);line-height:1.7}
.up-zone{border:2px dashed var(--brand);border-radius:var(--r);padding:28px;text-align:center;color:var(--text2);cursor:pointer;transition:background .15s;margin-bottom:12px}
.up-zone:hover{background:var(--brand-light)}
.hidden{display:none!important}
.tr{text-align:right}.tc{text-align:center}.fw{font-weight:700}.tm{color:var(--text2)}
.mt1{margin-top:8px}.mt2{margin-top:16px}.mb1{margin-bottom:8px}
.dv{border:none;border-top:1px solid var(--border);margin:16px 0}
.ab{padding:14px 16px;border-radius:8px;font-size:13px;margin-bottom:12px}
.aw{background:#fff8e1;border:1px solid #ffe082;color:#7a5c00}
.ai{background:#e3f2fd;border:1px solid #90caf9;color:#0d47a1}
.ae{background:#fde;border:1px solid #f99;color:#7a0000}
@media(max-width:640px){.sidebar{display:none}.fr.c2,.fr.c3,.fr.c4{grid-template-columns:1fr}}
</style>

<script>
// Global error handler — shows errors instead of silent failure
window.onerror=function(msg,src,line,col,err){
  const c=document.getElementById('pc');
  if(c&&c.innerHTML.includes('Loading')){
    c.innerHTML='<div class="card" style="margin:20px;border-left:4px solid #a32d2d"><div style="font-weight:700;color:#a32d2d;margin-bottom:8px">⚠️ JavaScript Error</div><p style="font-size:13px;font-family:monospace;color:#333">'+msg+'</p><p style="font-size:12px;color:#666">Line: '+line+' Col: '+col+'</p><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;background:#C85B2E;color:#fff;border:none;border-radius:8px;cursor:pointer">🔄 Reload Page</button></div>';
  }
  return false;
};
window.onunhandledrejection=function(e){
  console.error('Unhandled promise rejection:', e.reason);
  const c=document.getElementById('pc');
  if(c&&c.innerHTML.includes('Loading')){
    c.innerHTML='<div class="card" style="margin:20px;border-left:4px solid #a32d2d"><div style="font-weight:700;color:#a32d2d;margin-bottom:8px">⚠️ Async Error</div><p style="font-size:13px;font-family:monospace;color:#333">'+(e.reason?.message||String(e.reason))+'</p><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;background:#C85B2E;color:#fff;border:none;border-radius:8px;cursor:pointer">🔄 Reload Page</button></div>';
  }
};
// Logo loaded from server via loadImgB64()
// SAMVARDDH WORK-SPACE - 6 FIXES APPLIED
// Fix1: Quotation Modify tab  Fix2: PDF cover+Rs symbol+signature
// Fix3: Setup upload working  Fix4: Design files save button+upload fixed
// Fix5: Procurement conveyance  Fix6: Invoice full reconciliation+receipts

const API='http://localhost:8000/api';
let token=localStorage.getItem('sw_token')||'';
let currentUser=JSON.parse(localStorage.getItem('sw_user')||'null');
let currentPage='dashboard';
let companySetup={};
let qItems=[];

const Rs=n=>'Rs.'+Math.round(n||0).toLocaleString('en-IN');
const fmtDate=d=>d?new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'-';
const today=()=>new Date().toISOString().slice(0,10);
const numToWords=n=>{
  const a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  if(!n||n===0)return'Zero';
  const t2=n=>n<20?a[n]:b[Math.floor(n/10)]+(n%10?' '+a[n%10]:'');
  const t3=n=>n<100?t2(n):a[Math.floor(n/100)]+' Hundred'+(n%100?' '+t2(n%100):'');
  let r='',L=Math.floor(n/100000),rest=n%100000,T=Math.floor(rest/1000),rem=rest%1000;
  if(L)r+=t3(L)+' Lakh ';if(T)r+=t2(T)+' Thousand ';if(rem)r+=t3(rem);
  return r.trim()+' Only';
};

function notify(msg,type='success'){
  const el=document.createElement('div');
  el.className='notif n'+type[0];
  el.innerHTML=(type==='success'?'✅ ':type==='error'?'❌ ':'ℹ️ ')+msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),4000);
}

async function api(path,opts={}){
  const isForm=opts.body instanceof FormData;
  const hdrs=isForm?{'Authorization':'Bearer '+token}:{'Content-Type':'application/json','Authorization':'Bearer '+token};
  try{
    const res=await fetch(API+path,{...opts,headers:hdrs});
    if(res.status===401){doLogout();return null;}
    const data=await res.json().catch(()=>({}));
    if(!res.ok){notify(data.detail||'Server error','error');return null;}
    return data;
  }catch(e){notify('Cannot connect to server. Is START_SERVER.bat running?','error');return null;}
}

function canAccess(mod){if(!currentUser)return false;const a=currentUser.allowed_modules||[];return a.includes('*')||a.includes(mod);}

function render(){
  const root=document.getElementById('root');
  if(!token||!currentUser){root.innerHTML=renderLogin();return;}
  if(currentUser.force_password_change){root.innerHTML=renderForceChange();return;}
  root.innerHTML=renderTopNav()+`<div class="app-body">${renderSidebar()}<div class="content" id="pc">Loading...</div></div>`;
  loadSetup().then(()=>renderPageAsync(currentPage));
}
async function loadSetup(){const s=await api('/setup/');if(s)companySetup=s;}

function renderLogin(){
  return`<div class="login-wrap"><div class="login-box">
  <div class="ll-circle">S</div><div class="ll-name">SAMVARDDH</div><div class="ll-sub">Work-Space · Enriching Lives</div>
  <div id="lerr" class="login-err"></div>
  <label>Username</label><input id="lu" onkeydown="if(event.key==='Enter')doLogin()"/>
  <label>Password</label><input id="lp" type="password" onkeydown="if(event.key==='Enter')doLogin()"/>
  <button class="btn bp" style="width:100%;justify-content:center;padding:12px" onclick="doLogin()">Sign In →</button>
  <p style="text-align:center;font-size:11px;color:var(--text2);margin-top:14px">Samvarddh Associates Pvt. Ltd. · Bengaluru</p>
  </div></div>`;
}

async function doLogin(){
  const u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value;
  if(!u||!p){document.getElementById('lerr').textContent='Enter username and password.';return;}
  const res=await fetch(API+'/auth/login',{method:'POST',body:new URLSearchParams({username:u,password:p})});
  const data=await res.json().catch(()=>({}));
  if(!res.ok){document.getElementById('lerr').textContent=data.detail||'Login failed.';return;}
  token=data.access_token;
  currentUser={sub:u,role:data.role,full_name:data.full_name,force_password_change:data.force_password_change,allowed_modules:data.allowed_modules};
  localStorage.setItem('sw_token',token);localStorage.setItem('sw_user',JSON.stringify(currentUser));render();
}
function doLogout(){token='';currentUser=null;localStorage.removeItem('sw_token');localStorage.removeItem('sw_user');render();}

function renderForceChange(){
  return`<div class="login-wrap"><div class="login-box">
  <div class="ll-circle">S</div><div class="ll-name">SAMVARDDH</div>
  <div class="ab aw" style="margin-top:12px">⚠️ You must change your password before continuing.</div>
  <label>Current Password</label><input id="cc" type="password"/>
  <label style="margin-top:8px">New Password (min 6 chars)</label><input id="cn" type="password"/>
  <label style="margin-top:8px">Confirm New Password</label><input id="cconf" type="password"/>
  <div id="cperr" class="login-err mt1"></div>
  <button class="btn bp" style="width:100%;justify-content:center;padding:12px;margin-top:8px" onclick="doForceChange()">Change Password & Continue</button>
  </div></div>`;
}
async function doForceChange(){
  const cc=document.getElementById('cc').value,cn=document.getElementById('cn').value,cconf=document.getElementById('cconf').value;
  const e=document.getElementById('cperr');
  if(cn!==cconf){e.textContent='Passwords do not match.';return;}
  if(cn.length<6){e.textContent='Minimum 6 characters.';return;}
  const r=await api('/auth/change-password',{method:'POST',body:JSON.stringify({current_password:cc,new_password:cn})});
  if(r){currentUser.force_password_change=false;localStorage.setItem('sw_user',JSON.stringify(currentUser));notify('Password changed!');render();}
}

function renderTopNav(){
  return`<div class="topnav">
  <div class="nav-brand">
    <div class="nav-logo">${companySetup.logo_url?`<img src="${companySetup.logo_url}"/>`:(companySetup.brand_name||'S')[0]}</div>
    <div><div class="nav-name">${companySetup.brand_name||'SAMVARDDH'} WORK-SPACE</div><div class="nav-sub">${companySetup.legal_name||'Samvarddh Associates Pvt. Ltd.'}</div></div>
  </div>
  <span class="nav-user">👤 ${currentUser.full_name} (${currentUser.role})</span>
  <button class="btn bd bsm" onclick="doLogout()">⏻ Logout</button>
  </div>`;
}

const NAV=[{g:'Overview'},{id:'dashboard',ic:'📊',lb:'Dashboard',mod:'dashboard'},{g:'Client & Team'},
  {id:'clients',ic:'👥',lb:'Clients',mod:'clients'},{id:'employees',ic:'🏢',lb:'Employees',mod:'employees'},
  {id:'suppliers',ic:'🏭',lb:'Supplier Database',mod:'suppliers'},
  {g:'Project'},{id:'quotation',ic:'📋',lb:'Quotations',mod:'quotation'},
  {id:'designs',ic:'🎨',lb:'Design Files',mod:'design'},{id:'procurement',ic:'🛒',lb:'Procurement',mod:'procurement'},
  {id:'worklogs',ic:'📓',lb:'Work Progress',mod:'worklogs'},{g:'Finance'},
  {id:'invoices',ic:'🧾',lb:'Invoices',mod:'invoices'},{g:'Admin'},
  {id:'users',ic:'🔐',lb:'User Management',mod:'users'},{id:'setup',ic:'⚙️',lb:'Setup',mod:'setup'},
  {id:'backup',ic:'💾',lb:'Backup',mod:'backup'}];

function renderSidebar(){
  return`<nav class="sidebar">${NAV.map(n=>{
    if(n.g)return`<div class="ng">${n.g}</div>`;
    if(!canAccess(n.mod)&&currentUser.role!=='Admin')return'';
    return`<div class="ni ${currentPage===n.id?'active':''}" onclick="goto('${n.id}')"><span class="ni-ic">${n.ic}</span>${n.lb}</div>`;
  }).join('')}</nav>`;
}

function goto(page){
  currentPage=page;
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',el.getAttribute('onclick')?.includes("'"+page+"'")));
  const c=document.getElementById('pc');if(c){c.innerHTML='<div style="padding:20px;color:var(--text2)">Loading...</div>';renderPageAsync(page);}
}
async function renderPageAsync(page){
  const c=document.getElementById('pc');if(!c)return;
  const pages={dashboard:pgDashboard,clients:pgClients,employees:pgEmployees,quotation:pgQuotation,
    designs:pgDesigns,procurement:pgProcurement,worklogs:pgWorklogs,invoices:pgInvoices,
    users:pgUsers,setup:pgSetup,backup:pgBackup,suppliers:pgSuppliers};
  if(!pages[page]){
    c.innerHTML='<div class="card" style="margin:20px"><p class="tm">Page not found: '+page+'</p></div>';
    return;
  }
  c.innerHTML='<div style="padding:30px;text-align:center"><div style="font-size:14px;color:var(--text2)">⏳ Loading '+page+'...</div></div>';
  try{
    const html=await pages[page]();
    if(html===undefined||html===null){
      c.innerHTML='<div class="card" style="margin:20px"><div class="ct" style="color:var(--red)">⚠️ '+page+' returned no content</div><button onclick="goto(this.dataset.p)" data-p="'+page+'" style="margin-top:10px;padding:8px 16px;background:var(--brand);color:#fff;border:none;border-radius:8px;cursor:pointer">🔄 Retry</button></div>';
    }else{
      c.innerHTML=html;
    }
  }catch(err){
    console.error('Page error ['+page+']:', err);
    c.innerHTML='<div class="card" style="margin:20px;border-left:4px solid var(--red)"><div class="ct" style="color:var(--red)">⚠️ Error in '+page+'</div><pre style="font-size:12px;color:#333;margin-bottom:12px;white-space:pre-wrap">'+String(err.message||err)+'</pre><button onclick="goto(this.dataset.p)" data-p="'+page+'" style="padding:8px 16px;background:var(--brand);color:#fff;border:none;border-radius:8px;cursor:pointer">🔄 Retry</button></div>';
  }
}
function swTab(show,hideStr,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  hideStr.split(',').forEach(id=>{const e=document.getElementById(id.trim());if(e)e.classList.add('hidden');});
  const s=document.getElementById(show);if(s)s.classList.remove('hidden');
}

// Load dashboard data and fill in the sections
async function loadDashData(){
  try{
    const cf=window._dashFilters||{};
    let qp=[];
    if(cf.fy)qp.push('fy='+encodeURIComponent(cf.fy));
    if(cf.quarter)qp.push('quarter='+encodeURIComponent(cf.quarter));
    if(cf.city)qp.push('city='+encodeURIComponent(cf.city));
    if(cf.client_id)qp.push('client_id='+cf.client_id);
    if(cf.pm)qp.push('project_manager='+encodeURIComponent(cf.pm));
    const endpoint=qp.length?'/dashboard/summary/filtered?'+qp.join('&'):'/dashboard/summary';

    const d=await api(endpoint)||{};

    // ── KPIs ──
    const kpiEl=document.getElementById('dash-kpis');
    if(kpiEl){
      kpiEl.innerHTML=`
        <div class="metric"><div class="ml">Total Contract</div><div class="mv" style="font-size:16px">${Rs(d.total_contract)}</div><div class="ms">Finalised quotations</div></div>

        '<div class="tw"><table><thead><tr><th>Client</th><th>Task</th><th>Engineer</th><th>Delay</th></tr></thead><tbody>'+

  }
}


function renderBarChart(data,labelKey,valKey,title){
  if(!data||!data.length)return`<p class="tm" style="text-align:center;padding:20px">No data yet</p>`;
  const max=Math.max(...data.map(d=>d[valKey]||0),1);
  const colors=['var(--brand)','#1a5fa5','#2d7a2d','#7a5c00','#555'];
  return`<div style="display:flex;align-items:flex-end;gap:3px;height:100px;padding-top:8px">
    ${data.slice(0,12).reverse().map((d,i)=>{
      const pct=Math.max((d[valKey]||0)/max*100,2);
      return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px" title="${d[labelKey]}: ${Rs(d[valKey])}">
        <div style="width:100%;background:${colors[i%colors.length]};border-radius:3px 3px 0 0;height:${pct}%;min-height:4px"></div>
        <div style="font-size:8px;color:var(--text2);writing-mode:vertical-rl;transform:rotate(180deg);max-height:30px;overflow:hidden">${d[labelKey]||''}</div>
      </div>`;}).join('')}
  </div>
  <div style="font-size:10px;color:var(--text2);margin-top:4px;text-align:right">Total: ${Rs(data.reduce((a,d)=>a+(d[valKey]||0),0))}</div>`;
}

function renderDonut(data,labelKey,valKey){
  if(!data||!data.length)return'';
  const total=data.reduce((a,d)=>a+(d[valKey]||0),0);
  if(!total)return'';
  const cols=['#C85B2E','#1a5fa5','#2d7a2d','#7a5c00','#a32d2d','#555','#8b5cf6','#d97706'];
  let offset=0;
  const size=80,r=35,cx=40,cy=40;
  const slices=data.slice(0,8).map((d,i)=>{
    const pct=(d[valKey]||0)/total;
    const angle=pct*Math.PI*2;
    const x1=cx+r*Math.sin(offset);const y1=cy-r*Math.cos(offset);
    offset+=angle;
    const x2=cx+r*Math.sin(offset);const y2=cy-r*Math.cos(offset);
    const large=angle>Math.PI?1:0;
    return`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${cols[i%cols.length]}" opacity="0.85"/>`;
  }).join('');
  return`<svg viewBox="0 0 ${size} ${size}" style="width:80px;height:80px;float:right;margin-left:10px"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#f5f0ec"/>${slices}</svg>`;
}

function renderRevVsProc(data){
  if(!data||!data.length)return'<p class="tm" style="text-align:center;padding:20px">No project data yet</p>';
  const maxVal=Math.max(...data.map(d=>Math.max(d.contract_value||d.contract||0,d.total_procurement||0,d.revenue_collected||d.total_collected||0)),1);
  return`<div style="overflow-x:auto"><div style="min-width:600px">
    <div style="display:flex;gap:14px;margin-bottom:10px;font-size:12px">
      <span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:14px;background:var(--brand);border-radius:3px;display:inline-block"></span>Contract Value</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:14px;background:#2d7a2d;border-radius:3px;display:inline-block"></span>Revenue Collected</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:14px;background:#a32d2d;border-radius:3px;display:inline-block"></span>Procurement/Expenses</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
    ${data.slice(0,10).map(d=>{
      const contract=d.contract_value||d.contract||0;
      const collected=d.revenue_collected||d.total_collected||0;
      const proc=d.total_procurement||0;
      const margin=contract-proc;
      const marginPct=contract>0?Math.round(margin/contract*100):0;
      return`<div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;font-weight:700;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.client_name}">${d.client_name}</span>
          <span style="font-size:11px;color:${marginPct>30?'var(--green)':marginPct>15?'#7a5c00':'var(--red)'}">Margin: ${marginPct}%</span>
        </div>
        <div style="display:flex;gap:2px;height:18px;border-radius:4px;overflow:hidden">
          <div style="width:${Math.round(contract/maxVal*100)}%;background:var(--brand);opacity:0.85;min-width:2px" title="Contract: ${Rs(contract)}"></div>
        </div>
        <div style="display:flex;gap:2px;height:18px;border-radius:4px;overflow:hidden;margin-top:2px">
          <div style="width:${Math.round(collected/maxVal*100)}%;background:#2d7a2d;opacity:0.85;min-width:2px" title="Collected: ${Rs(collected)}"></div>
          <div style="width:${Math.round(proc/maxVal*100)}%;background:#a32d2d;opacity:0.75;min-width:2px" title="Procurement: ${Rs(proc)}"></div>
        </div>
        <div style="display:flex;gap:14px;font-size:10px;color:var(--text2);margin-top:2px">
          <span>Contract: ${Rs(contract)}</span><span>Collected: ${Rs(collected)}</span><span>Expenses: ${Rs(proc)}</span><span style="font-weight:700;color:${margin>0?'var(--green)':'var(--red)'}">Margin: ${Rs(margin)}</span>
        </div>
      </div>`;}).join('')}
    </div></div></div>`;
}

function fyOpts(selected){
  const now=new Date().getFullYear();

  for(let y=now-4;y<=now+2;y++){opts.push(`${y}-${String(y+1).slice(2)}`);}
  return opts.map(f=>`<option value="${f}" ${f===selected?'selected':''}>${f}</option>`).join('');
}

async function loadModQ(id){
  const q=await api(`/quotations/${id}`);if(!q)return;
  if(q.status==='Finalised'){notify('Finalised quotation cannot be modified','error');return;}
  // Set global qItems
  qItems=(q.items||[]).map(it=>({...it,id:Date.now()+(Math.random()*10000|0)}));
  // Always re-fetch fresh CXOs and clients
  const emps=await api('/employees/')||[];
  window._cxoEmps=emps.filter(e=>e.designation==='CXO'&&e.status==='Active');
  const clients=await api('/clients/')||[];
  window._allClients=clients;
  // Build cOpts with the current client pre-selected
  const cOpts=clients.map(c=>`<option value="${c.id}" ${String(c.id)===String(q.client_id)?'selected':''}>${c.client_name}</option>`).join('');
  // Show modify tab, hide others
  const tab=document.getElementById('qt-mod-tab');
  if(tab)tab.style.display='';
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
  if(tab)tab.classList.add('active');
  document.getElementById('qt-list')?.classList.add('hidden');
  document.getElementById('qt-new')?.classList.add('hidden');
  document.getElementById('qt-mod')?.classList.remove('hidden');
  // Render the form fresh into the modify card (fresh render = no stale IDs)
  const card=document.getElementById('qt-mod-card');
  if(!card)return;
  card.innerHTML=renderQForm(cOpts,q);
  // Now that HTML is in DOM, set select values (selects need JS .value= not just HTML 'selected' attr)
  // The 'selected' attribute on <option> IS respected by innerHTML, but set .value explicitly too
  requestAnimationFrame(()=>{
    // Client
    const cl=document.getElementById('nq-cl');
    if(cl)cl.value=String(q.client_id);
    // Financial Year
    const fy=document.getElementById('nq-fy');
    if(fy&&q.financial_year)fy.value=q.financial_year;
    // GST type
    const gt=document.getElementById('nq-gt');
    if(gt)gt.value=q.gst_type||'Intra-State';
    // Negotiated amount (both fields)
    const neg1=document.getElementById('nq-neg');
    if(neg1)neg1.value=q.negotiated_amount||'';
    const neg2=document.getElementById('nq-neg2');
    if(neg2)neg2.value=q.negotiated_amount||'';
    // GST rate
    const gr=document.getElementById('nq-gr');
    if(gr)gr.value=q.gst_rate||18;
    // Approver
    const ap=document.getElementById('nq-ap');
    if(ap&&q.approver_name){
      // Check if option exists
      const existing=[...ap.options].find(o=>o.value===q.approver_name);
      if(existing){ap.value=q.approver_name;}
      else{
        const opt=document.createElement('option');
        opt.value=q.approver_name;
        opt.textContent=q.approver_name+' (existing approver)';
        ap.add(opt,ap.options.length-1);
        ap.value=q.approver_name;
      }
    }
    // Render line items
    renderQItems();
    recalcQ();
  });
}

function addQLine(){
  const tb=document.getElementById('qitb');
  if(!tb){notify('Please use the form above to add items — form not ready yet.','error');return;}
  qItems.push({id:Date.now()+(Math.random()*10000|0),location:'',element:'',length_ft:0,breadth_ft:1,height_ft:0,qty:0,rate:0,remarks:''});
  renderQItems();
  // Scroll to the new row
  tb.lastElementChild?.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function removeQLine(id){qItems=qItems.filter(x=>x.id!==id);renderQItems();}
function upd(id,f,v){const it=qItems.find(x=>x.id===id);if(it){it[f]=['location','element','remarks'].includes(f)?v:+v;}recalcQ();}

function renderQItems(){
  const tb=document.getElementById('qitb');if(!tb)return;
  const lOpts=LOCS.map(l=>`<option>${l}</option>`).join('');
  const eOpts=ELEMS.map(e=>`<option>${e}</option>`).join('');
  tb.innerHTML=qItems.map((it,idx)=>{
    const calcQty=it.length_ft*(it.breadth_ft||1)*it.height_ft;
    const qty=it.qty>0?it.qty:calcQty;
    const amt=qty*(it.rate||0);
    return`<tr><td style="color:var(--text2);font-size:12px">${idx+1}</td>
    <td><select style="min-width:110px" onchange="upd(${it.id},'location',this.value)"><option>Select...</option>${LOCS.map(l=>`<option ${l===it.location?'selected':''}>${l}</option>`).join('')}</select></td>
    <td><select style="min-width:130px" onchange="upd(${it.id},'element',this.value)"><option>Select...</option>${ELEMS.map(e=>`<option ${e===it.element?'selected':''}>${e}</option>`).join('')}</select></td>
    <td><input type="number" value="${it.length_ft||0}" style="width:65px" oninput="upd(${it.id},'length_ft',this.value)"/></td>
    <td><input type="number" value="${it.breadth_ft||1}" style="width:55px" oninput="upd(${it.id},'breadth_ft',this.value)"/></td>
    <td><input type="number" value="${it.height_ft||0}" style="width:65px" oninput="upd(${it.id},'height_ft',this.value)"/></td>
    <td><input type="number" value="${qty.toFixed(2)}" style="width:90px" id="qty${it.id}" oninput="upd(${it.id},'qty',this.value)" title="Leave 0 for auto (L×B×H)"/></td>
    <td><input type="number" value="${it.rate||0}" style="width:90px" oninput="upd(${it.id},'rate',this.value)"/></td>
    <td style="font-weight:700;color:var(--brand);min-width:90px" id="amt${it.id}">Rs.${Math.round(amt).toLocaleString('en-IN')}</td>
    <td><input value="${it.remarks||''}" oninput="upd(${it.id},'remarks',this.value)" style="min-width:100px"/></td>
    <td><button class="btn bd bsm" style="padding:4px 8px" onclick="removeQLine(${it.id})">✕</button></td></tr>`;
  }).join('');
  recalcQ();
}

function recalcQ(){
  let grand=0;
  qItems.forEach(it=>{
    const qty=it.qty>0?it.qty:it.length_ft*(it.breadth_ft||1)*it.height_ft;
    const amt=qty*(it.rate||0);grand+=amt;
    const el=document.getElementById('amt'+it.id);
    if(el)el.textContent='Rs.'+Math.round(amt).toLocaleString('en-IN');
  });
  const gr=+(document.getElementById('nq-gr')?.value||18);
  const ge=document.getElementById('nq-grand'),te=document.getElementById('nq-tgst');
  if(ge)ge.value='Rs.'+Math.round(grand).toLocaleString('en-IN');
  if(te)te.value='Rs.'+Math.round(grand+grand*gr/100).toLocaleString('en-IN');
}

async function saveQ(existId){
  const qno=document.getElementById('nq-no')?.value.trim();
  const cid=document.getElementById('nq-cl')?.value;
  if(!qno||!cid){notify('Quote number and client required','error');return;}
  // Get approver: dropdown or manual field
  let apSel=document.getElementById('nq-ap')?.value||'';
  if(apSel==='__manual__'){apSel=document.getElementById('nq-ap-manual')?.value.trim()||'';}
  const neg1=+(document.getElementById('nq-neg')?.value||0);
  const neg2=+(document.getElementById('nq-neg2')?.value||0);
  const data={quotation_number:qno,client_id:+cid,
    quotation_date:document.getElementById('nq-dt').value,
    project_name:document.getElementById('nq-pj').value,
    financial_year:document.getElementById('nq-fy').value,
    gst_type:document.getElementById('nq-gt').value,
    gst_rate:+(document.getElementById('nq-gr').value||18),
    negotiated_amount:neg2||neg1,
    approver_name:apSel,
    terms:document.getElementById('nq-tc').value,
    payment_terms:document.getElementById('nq-pt').value,
    items:qItems.map(it=>({...it,qty:it.qty>0?it.qty:it.length_ft*(it.breadth_ft||1)*it.height_ft}))};
  let r;
  if(existId&&existId!=='null'){
    r=await api(`/quotations/${existId}`,{method:'PUT',body:JSON.stringify(data)});
  }else{
    r=await api('/quotations/',{method:'POST',body:JSON.stringify(data)});
  }
  if(r){notify(existId&&existId!=='null'?'Quotation updated ✓':'Quotation saved ✓');qItems=[];goto('quotation');}
}

async function finaliseQ(id){
  const qid=id&&id!=='null'?id:null;
  if(!qid){notify('Save quotation first before finalising','error');return;}
  if(!confirm('Finalise this quotation? It will be locked permanently.'))return;
  const r=await api(`/quotations/${qid}/finalise`,{method:'POST'});if(r){notify('Finalised ✓');goto('quotation');}
}


// Helper: load an image URL as base64 for use in jsPDF
async function loadImgB64(url){
  return new Promise((res)=>{
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{
      const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
      c.getContext('2d').drawImage(img,0,0);
      res(c.toDataURL('image/png'));
    };
    img.onerror=()=>res(null);
    img.src=url+'?t='+Date.now();
  });
}

  doc.text('Total with GST:',118,y);doc.text('Rs.'+Math.round(grand+gst).toLocaleString('en-IN'),196,y,'right');y+=7;

async function exportQXLS(id){
  const q=await api(`/quotations/${id}`);if(!q)return;
  const rows=(q.items||[]).map(it=>({'Location':it.location,'Element':it.element,'L(ft)':it.length_ft,'B(ft)':it.breadth_ft,'H(ft)':it.height_ft,'Qty':it.qty,'Rate(Rs.)':it.rate,'Amount(Rs.)':it.amount,'Remarks':it.remarks}));
  rows.push({'Location':'','Element':'GRAND TOTAL','Amount(Rs.)':(q.items||[]).reduce((a,i)=>a+i.amount,0)});
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Quotation');
  XLSX.writeFile(wb,'Samvarddh_Quote_'+q.quotation_number+'.xlsx');notify('Excel exported ✓');
}



function renderClientWiseDesigns(designs){
  const byClient={};
  designs.forEach(d=>{
    const key=d.client_name||'Unknown';
    if(!byClient[key])byClient[key]=[];
    byClient[key].push(d);
  });
  if(!Object.keys(byClient).length)return'<div class="card"><p class="tm" style="padding:20px;text-align:center">No design files yet.</p></div>';
  return Object.entries(byClient).map(([clientName,files])=>{
    const sorted=[...files].sort((a,b)=>{
      const aF=(a.version||'').toLowerCase().includes('final')?1:0;
      const bF=(b.version||'').toLowerCase().includes('final')?1:0;
      return bF-aF;
    });
    const finalFile=sorted.find(f=>(f.version||'').toLowerCase().includes('final'));
    const latestDate=sorted[0]?.upload_date||'';
    return`<div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <div style="font-size:15px;font-weight:700">👤 ${clientName}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px">
            ${files.length} version(s) · Latest: ${fmtDate(latestDate)} ·
            ${finalFile?'<span style="color:var(--green);font-weight:600">✅ Final version uploaded</span>':'<span style="color:#7a5c00;font-weight:600">⚠️ No final version</span>'}
          </div>
        </div>
        <div style="display:flex;gap:8px">
          ${finalFile&&finalFile.file_url?`<a href="${finalFile.file_url}" target="_blank" class="btn bp bsm">📄 Final PDF</a>`:''}
          ${finalFile&&finalFile.drive_link?`<a href="${finalFile.drive_link}" target="_blank" class="btn bb bsm">↗ Drive</a>`:''}
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:10px">
        ${sorted.map(f=>{
          const isFinal=(f.version||'').toLowerCase().includes('final');
          return`<div style="border:1.5px solid ${isFinal?'#2d7a2d':'var(--border)'};border-radius:8px;padding:10px 14px;background:${isFinal?'#f0fff4':'#faf8f6'};min-width:170px;max-width:220px">
            <div style="margin-bottom:5px"><span class="badge ${isFinal?'bg':'bb2'}">${f.version||'—'}</span>${isFinal?' <span style="font-size:10px;color:var(--green);font-weight:700">APPROVED</span>':''}</div>
            <div style="font-size:11px;color:var(--text2);margin-bottom:3px">${fmtDate(f.upload_date)}</div>
            <div style="font-size:11px;color:var(--text2);margin-bottom:6px">${f.designer_names||'—'}</div>
            ${f.notes?`<div style="font-size:11px;color:var(--text2);margin-bottom:6px;font-style:italic">"${f.notes}"</div>`:''}
            <div style="display:flex;gap:8px">
              ${f.file_url?`<a href="${f.file_url}" target="_blank" style="font-size:12px;color:var(--brand);font-weight:600">📄 PDF</a>`:''}
              ${f.drive_link?`<a href="${f.drive_link}" target="_blank" style="font-size:12px;color:var(--blue);font-weight:600">↗ Drive</a>`:''}
            </div>
          </div>`;}).join('')}
      </div>
    </div>`;
  }).join('');
}

function onFileSelect(input){
  const f=input.files[0];
  const el=document.getElementById('df-fname');
  const zone=document.getElementById('drop-zone');
  if(f){
    el.textContent='✅ Selected: '+f.name+' ('+Math.round(f.size/1024)+' KB)';
    if(zone){zone.style.borderColor='var(--green)';zone.style.background='#f0fff0';}
  }else{
    el.textContent='';
    if(zone){zone.style.borderColor='var(--brand)';zone.style.background='';}
  }
}

async function uploadDesign(){
  const cid=document.getElementById('df-cl').value;
  const ver=document.getElementById('df-v').value.trim();
  const file=document.getElementById('df-f').files[0];
  if(!cid){notify('Please select a client','error');return;}
  if(!ver){notify('Please enter version number (e.g. v1, Final)','error');return;}
  if(!file){notify('Please select a PDF file','error');return;}
  if(!file.name.toLowerCase().endsWith('.pdf')){notify('Only PDF files are allowed — please select a .pdf file','error');return;}
  const prog=document.getElementById('df-prog');const btn=document.getElementById('df-upload-btn');
  if(prog)prog.classList.remove('hidden');if(btn)btn.disabled=true;
  const fd=new FormData();
  fd.append('client_id',cid);
  fd.append('version',ver);
  fd.append('designer_names',document.getElementById('df-d').value||'');
  fd.append('notes',document.getElementById('df-n').value||'');
  fd.append('drive_link',document.getElementById('df-dr').value||'');
  fd.append('quotation_id',document.getElementById('df-q').value||'');
  fd.append('file',file);
  const r=await api('/designs/upload',{method:'POST',body:fd});
  if(prog)prog.classList.add('hidden');if(btn)btn.disabled=false;
  if(r){notify('Design file uploaded and saved successfully ✓');goto('designs');}
}

async function popSupplierList(){

  dl.innerHTML=window._supplierOpts;
}

async function showSupSuggest(val){
  const box=document.getElementById('sup-suggest');
  if(!box)return;
  // Load suppliers fresh if not yet cached
  if(!window._supplierNames||window._supplierNames.length===0){
    const sups=await api('/suppliers/')||[];
    window._supplierNames=sups.filter(s=>s.status==='Active').map(s=>s.supplier_name);
    window._supplierFull=sups.filter(s=>s.status==='Active'); // store full objects too
  }
  const all=window._supplierNames||[];
  // Filter by typed value (or show all if empty/focused with no input)
  const q=(val||'').toLowerCase().trim();
  const matches=q.length>0
    ? all.filter(s=>s.toLowerCase().includes(q))
    : all.slice(0,10); // show first 10 when focused with no input

  let html='';
  // Show matching suppliers
  if(matches.length){
    html+=matches.map(s=>{
      const sup=window._supplierFull?.find(x=>x.supplier_name===s);
      const cat=sup?.category?` <span style="font-size:11px;color:var(--text2)">(${sup.category})</span>`:'';
      const phone=sup?.phone?` · ${sup.phone}`:'';
      return`<div onmousedown="event.preventDefault();document.getElementById('pr-vn').value='${s.replace(/'/g,"\'")}';document.getElementById('sup-suggest').style.display='none';"
        style="padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f5ede8;display:flex;justify-content:space-between;align-items:center"
        onmouseover="this.style.background='#fef4ef'" onmouseout="this.style.background='#fff'">
        <span><b>${s}</b>${cat}</span>
        <span style="font-size:11px;color:var(--text2)">${phone}</span>
      </div>`;}).join('');
  } else {
    html+=`<div style="padding:10px 14px;font-size:13px;color:var(--text2)">No supplier found for "<b>${val}</b>"</div>`;
  }
  // Always show "Add as new" option when there's text
  if(val&&val.trim().length>0){
    const isExact=all.some(s=>s.toLowerCase()===val.toLowerCase());
    if(!isExact){
      html+=`<div onmousedown="event.preventDefault();document.getElementById('pr-vn').value='${val.replace(/'/g,"\'")}';document.getElementById('sup-suggest').style.display='none';addSupplierQuick('${val.replace(/'/g,"\'")}');"
        style="padding:10px 14px;cursor:pointer;font-size:13px;background:#fef9f5;border-top:2px solid var(--brand);color:var(--brand);font-weight:600"
        onmouseover="this.style.background='#fee8dc'" onmouseout="this.style.background='#fef9f5'">
        ✚ Add "<b>${val}</b>" as new supplier
      </div>`;
    }
  }
  if(!html){box.style.display='none';return;}
  box.innerHTML=html;
  box.style.display='block';
}

    window._supplierNames=null; // force refresh next time
    notify('Supplier "'+name+'" saved to database ✓');

}

async function addProc(type){
  let d;

    d={client_id:+document.getElementById('cv-cl').value,procurement_date:document.getElementById('cv-dt').value,
      entry_type:'Conveyance',
      vendor_name:empName,
      employee_name:empName,
      item_name:document.getElementById('cv-pu').value||'Conveyance',
      category:'Conveyance',
      conveyance_mode:document.getElementById('cv-mo').value,
      conveyance_from:document.getElementById('cv-fr').value||'',
      conveyance_to:document.getElementById('cv-to').value||'',
      conveyance_purpose:document.getElementById('cv-pu').value||'',
      bill_number:document.getElementById('cv-bn').value,
      amount:+(document.getElementById('cv-am').value||0),
      payment_status:document.getElementById('cv-rs').value,

}
async function delProc(id){if(!confirm('Delete?'))return;await api(`/procurement/${id}`,{method:'DELETE'});notify('Deleted');goto('procurement');}
async function approveConv(id,action){
  const labels={'Approved':'Approve','Rejected':'Reject','Reimbursed':'Mark as Reimbursed'};
  if(!confirm(labels[action]+' this conveyance?'))return;
  const ep=action==='Approved'?'approve-conveyance':action==='Rejected'?'reject-conveyance':'reimburse-conveyance';
  const r=await api(`/procurement/${id}/${ep}`,{method:'POST'});
  if(r){notify(`Conveyance ${action} ✓`);goto('procurement');}
}

        if(tkSel)tkSel.innerHTML='<option value="">Error loading — type manually</option>';

    });
    // Auto-trigger if client is pre-selected
    if(wlCl.value)wlCl.dispatchEvent(new Event('change'));

      const manual=document.getElementById('wl-tk-manual');
      if(manual)manual.style.display=this.value==='__other__'||!this.value?'block':'none';
    });
  },100);
}

async function exportReceiptPDF(receiptId){
  // Find receipt from the loaded receipts
  const receipts=await api('/invoices/receipts/all')||[];
  const r=receipts.find(x=>x.id===receiptId)||receipts[receiptId];
  if(!r){
    // If receiptId is actually the receipt object index, use it directly

  await generateReceiptPDF(r);
}

async function generateReceiptPDF(r){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const brand=companySetup.brand_name||'SAMVARDDH';
  const legal=companySetup.legal_name||'Samvarddh Associates Pvt. Ltd.';
  const logoB64r=companySetup.logo_url?await loadImgB64(companySetup.logo_url):null;
  const sigB64r=companySetup.signature_url?await loadImgB64(companySetup.signature_url):null;

  // Header
  doc.setFillColor(200,91,46);doc.rect(0,0,210,28,'F');
  if(logoB64r){try{doc.addImage(logoB64r,'JPEG',184,4,20,20);}catch(e){}}
  doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(255,255,255);
  doc.text(brand+' ASSOCIATES PVT. LTD.',14,12);
  doc.setFont('helvetica','normal');doc.setFontSize(8);
  doc.text(legal+' | '+(companySetup.city||'Bengaluru')+' | '+(companySetup.website||'www.samvarddh.com'),14,21);
  if(companySetup.gstin){doc.text('GSTIN: '+companySetup.gstin,196,21,'right');}

  let y=38;
  // Title
  doc.setFont('helvetica','bold');doc.setFontSize(16);doc.setTextColor(200,91,46);
  doc.text('PAYMENT RECEIPT',105,y,'center');y+=4;
  doc.setDrawColor(200,91,46);doc.setLineWidth(1);doc.line(60,y,150,y);y+=10;

  // Receipt box
  doc.setFillColor(252,246,239);doc.roundedRect(14,y,182,75,6,6,'F');
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(0,0,0);

  const rows=[
    ['Receipt Date:', fmtDate(r.receipt_date)],
    ['Client:', r.client_name||'—'],
    ['Invoice Number:', r.invoice_number||'—'],
    ['Invoice Type:', r.invoice_type||'—'],
    ['Mode of Payment:', r.mode||'—'],
    ['Reference / UTR No.:', r.reference_number||'—'],
    ['Remarks:', r.remarks||'—'],
  ];
  rows.forEach(([k,v],i)=>{
    const ry=y+10+i*9;
    doc.setFont('helvetica','bold');doc.text(k,20,ry);
    doc.setFont('helvetica','normal');doc.text(String(v),85,ry);
  });
  y+=80;

  // Amount box - prominent
  doc.setFillColor(200,91,46);doc.roundedRect(14,y,182,28,5,5,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(255,255,255);
  doc.text('AMOUNT RECEIVED',105,y+10,'center');
  doc.setFontSize(18);doc.text('Rs. '+Math.round(r.amount||0).toLocaleString('en-IN'),105,y+22,'center');
  y+=36;

  // Amount in words
  doc.setFont('helvetica','italic');doc.setFontSize(9);doc.setTextColor(80,50,30);
  doc.text('Amount in Words: '+numToWords(Math.round(r.amount||0)),14,y);y+=10;

  // GST note
  doc.setFillColor(254,249,245);doc.rect(14,y,182,16,'F');
  doc.setDrawColor(200,91,46);doc.setLineWidth(0.4);doc.rect(14,y,182,16,'S');
  doc.setFont('helvetica','italic');doc.setFontSize(7.5);doc.setTextColor(80,50,30);
  const gstLines=doc.splitTextToSize(GST_CLAUSE,176);
  doc.text(gstLines[0]||GST_CLAUSE,16,y+6);
  if(gstLines[1])doc.text(gstLines[1],16,y+11);
  y+=22;doc.setTextColor(0,0,0);

  // Bank details
  if(companySetup.bank_name){
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text('Our Bank Details:',14,y);y+=5;
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);
    doc.text('Bank: '+companySetup.bank_name+' | A/c: '+companySetup.bank_account+' | IFSC: '+companySetup.bank_ifsc,14,y);y+=8;
  }

  // Signature
  const sy=Math.min(Math.max(y+10,255),272);
  if(sigB64r){try{doc.addImage(sigB64r,'PNG',138,sy-18,44,15);}catch(e){try{doc.addImage(sigB64r,'JPEG',138,sy-18,44,15);}catch(e2){}}}
  doc.setFont('helvetica','bold');doc.setFontSize(9);
  doc.line(130,sy-2,196,sy-2);
  doc.text('Authorised Signatory',163,sy+3,'center');
  doc.text(brand+' ASSOCIATES PVT. LTD.',163,sy+9,'center');
  if(companySetup.authorised_signatory)doc.text(companySetup.authorised_signatory,163,sy+15,'center');

  // Note at bottom
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(120,120,120);
  doc.text('This is a computer generated receipt. Date: '+new Date().toLocaleDateString('en-IN'),14,285);

  doc.save('Samvarddh_Receipt_'+r.invoice_number+'_'+fmtDate(r.receipt_date).replace(/ /g,'_')+'.pdf');
  notify('Receipt PDF exported ✓');
}

async function autoPopulateInv(){
  const qid=document.getElementById('ni-qu')?.value;const type=document.getElementById('ni-ty')?.value;
  if(!qid)return;
  const quotes=window._quotesForInv||[];const q=quotes.find(x=>String(x.id)===String(qid));if(!q)return;
  const negAmt=+(q.negotiated_amount||0);const half=Math.round(negAmt/2);
  const cl=document.getElementById('ni-cl');if(cl&&q.client_id)cl.value=q.client_id;
  if(type==='Tax'){const tv=document.getElementById('ni-tv');if(tv){tv.value=half;tv.dispatchEvent(new Event('input'));}const hint=document.getElementById('ni-tv-hint');if(hint)hint.textContent='50% of '+Rs(negAmt);}
  else{const existingInvs=window._existingInvs||[];const taxInv=existingInvs.find(i=>String(i.quotation_id)===String(qid)&&i.invoice_type==='Tax'&&i.status==='Finalised');const rv=document.getElementById('ni-rv');const hint=document.getElementById('ni-rv-hint');if(taxInv){const bal=Math.round(negAmt-(taxInv.taxable_value||0));if(rv)rv.value=Math.max(bal,0);if(hint)hint.textContent='Balance: '+Rs(negAmt)+' - '+Rs(taxInv.taxable_value)+' = '+Rs(Math.max(bal,0));}else{if(rv)rv.value=half;if(hint)hint.textContent='50% of '+Rs(negAmt);}}
}

async function expInvPDF(id){
  if(!id){notify('No invoice selected','error');return;}
  const inv=await api(`/invoices/${id}`);if(!inv)return;
  const {jsPDF}=window.jspdf;const doc=new jsPDF();const isTax=inv.invoice_type==='Tax';
  const brand=companySetup.brand_name||'SAMVARDDH';
  const legal=companySetup.legal_name||'Samvarddh Associates Pvt. Ltd.';
  const logoB64inv=companySetup.logo_url?await loadImgB64(companySetup.logo_url):null;
  const sigB64inv=companySetup.signature_url?await loadImgB64(companySetup.signature_url):null;
  doc.setFillColor(isTax?200:24,isTax?91:95,isTax?46:165);doc.rect(0,0,210,28,'F');
  if(logoB64inv){try{doc.addImage(logoB64inv,'JPEG',184,2,20,20);}catch(e){}}
  doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(255,255,255);doc.text(brand+' ASSOCIATES PVT. LTD.',14,11);
  doc.setFontSize(7.5);doc.setFont('helvetica','normal');
  doc.text(legal+' | '+(companySetup.city||'Bengaluru')+', '+(companySetup.state||'Karnataka')+' | '+(companySetup.website||'www.samvarddh.com'),14,19);
  if(companySetup.gstin){doc.setFontSize(7.5);doc.text('GSTIN: '+companySetup.gstin,14,25);}
  doc.setTextColor(0,0,0);let y=34;
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.text(isTax?'TAX INVOICE':'REIMBURSEMENT INVOICE',14,y);
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text('Invoice No: '+inv.invoice_number,14,y+8);doc.text('Date: '+fmtDate(inv.invoice_date),14,y+15);
  doc.text('Bill To: '+inv.client_name,120,y);if(inv.gstin)doc.text('GSTIN: '+inv.gstin,120,y+8);
  y+=28;doc.line(14,y,196,y);y+=6;
  doc.setFont('helvetica','bold');doc.text('Description',14,y);doc.text('Amount (Rs.)',196,y,'right');y+=4;doc.line(14,y,196,y);y+=5;doc.setFont('helvetica','normal');
  if(isTax){
    doc.text('Interior Design & Execution Service charges',14,y);doc.text('Rs.'+Math.round(inv.taxable_value).toLocaleString('en-IN'),196,y,'right');y+=8;
    if(inv.cgst>0){doc.text('CGST @ 9%',14,y);doc.text('Rs.'+Math.round(inv.cgst).toLocaleString('en-IN'),196,y,'right');y+=7;doc.text('SGST @ 9%',14,y);doc.text('Rs.'+Math.round(inv.sgst).toLocaleString('en-IN'),196,y,'right');y+=8;}
    if(inv.igst>0){doc.text('IGST @ 18%',14,y);doc.text('Rs.'+Math.round(inv.igst).toLocaleString('en-IN'),196,y,'right');y+=8;}
  }else{
    doc.text('Reimbursement against payments made on behalf of client',14,y);doc.text('Rs.'+Math.round(inv.reimbursement_amount).toLocaleString('en-IN'),196,y,'right');y+=8;
    doc.text('GST on Reimbursement',14,y);doc.text('NIL (Rule 33 CGST Rules)',196,y,'right');y+=8;
  }
  doc.line(14,y,196,y);y+=6;doc.setFont('helvetica','bold');
  doc.text('TOTAL INVOICE AMOUNT',120,y);doc.text('Rs.'+Math.round(inv.total_amount).toLocaleString('en-IN'),196,y,'right');y+=8;
  doc.setFont('helvetica','italic');doc.setFontSize(8);doc.text('Amount in Words: '+numToWords(Math.round(inv.total_amount)),14,y);y+=8;
  // ── TERMS & CONDITIONS (GST Clause) — comes FIRST ──
  doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(0,0,0);
  doc.text('Terms & Conditions:',14,y);y+=5;
  const tLines=doc.splitTextToSize(GST_CLAUSE,176);
  doc.setFillColor(254,249,245);doc.rect(14,y-2,182,tLines.length*4+8,'F');
  doc.setDrawColor(200,91,46);doc.setLineWidth(0.4);doc.rect(14,y-2,182,tLines.length*4+8,'S');
  doc.setFont('helvetica','italic');doc.setFontSize(7.5);doc.setTextColor(80,50,30);
  doc.text(tLines,16,y+3);y+=tLines.length*4+12;
  doc.setTextColor(0,0,0);
  // ── PAYMENT TERMS — comes AFTER Terms & Conditions ──
  if(inv.payment_terms&&inv.payment_terms.trim()){
    doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(0,0,0);
    doc.text('Payment Terms:',14,y);y+=6;
    const ptLines=doc.splitTextToSize(inv.payment_terms,176);
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);
    doc.text(ptLines,14,y);y+=ptLines.length*5+6;
  }
  if(companySetup.bank_name){doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.text('Bank Details:',14,y);y+=4;doc.setFont('helvetica','normal');doc.text('Bank: '+companySetup.bank_name+' | A/c: '+companySetup.bank_account+' | IFSC: '+companySetup.bank_ifsc,14,y);y+=6;}
  const sy=Math.min(Math.max(y+6,255),278);
  doc.setFont('helvetica','bold');doc.setFontSize(9);
  if(sigB64inv){try{doc.addImage(sigB64inv,'PNG',140,sy-18,40,15);}catch(e){try{doc.addImage(sigB64inv,'JPEG',140,sy-18,40,15);}catch(e2){}}}
  doc.line(132,sy-2,196,sy-2);doc.text('Authorised Signatory',164,sy+3,'center');
  doc.text(brand+' ASSOCIATES PVT. LTD.',164,sy+9,'center');
  if(companySetup.authorised_signatory)doc.text(companySetup.authorised_signatory,164,sy+15,'center');
  doc.save('Samvarddh_'+(isTax?'TaxInv':'Reimb')+'_'+inv.invoice_number+'.pdf');notify('Invoice PDF exported ✓');
}

      <div id="sig-prog" class="hidden" style="font-size:12px;color:var(--green)">⏳ Uploading...</div>
      <button class="btn bp bsm" onclick="uploadSig()" style="margin-top:6px">📤 Upload Signature</button></div>
  </div></div>
  <div class="card"><div class="ct">📁 Data Storage Paths</div>
  <table><tbody>${[['Database',paths.database],['Uploads',paths.uploads],['Reports',paths.reports],['Backups',paths.backups]].map(([k,v])=>`<tr><td class="fw" style="padding:8px 12px;width:100px">${k}</td><td style="font-family:monospace;background:#f5f5f5;padding:8px 12px;border-radius:6px">${v||'-'}</td></tr>`).join('')}</tbody></table></div>`;
}
async function saveSetup(){const d={brand_name:document.getElementById('s-br').value,legal_name:document.getElementById('s-ln').value,gstin:document.getElementById('s-gs').value,pan:document.getElementById('s-pan').value,phone:document.getElementById('s-ph').value,email:document.getElementById('s-em').value,website:document.getElementById('s-wb').value,city:document.getElementById('s-cy').value,state:document.getElementById('s-st').value,authorised_signatory:document.getElementById('s-as').value,address:document.getElementById('s-ad').value,bank_name:document.getElementById('s-bn').value,bank_account:document.getElementById('s-ba').value,bank_ifsc:document.getElementById('s-bi').value,bank_branch:document.getElementById('s-bb').value,default_terms:document.getElementById('s-tc').value};const r=await api('/setup/',{method:'PUT',body:JSON.stringify(d)});if(r){notify('Setup saved ✓');await loadSetup();}}
async function uploadLogo(){const f=document.getElementById('s-logo').files[0];if(!f){notify('Select image first','error');return;}const allowed=['image/png','image/jpeg','image/gif','image/webp'];if(!allowed.includes(f.type)){notify('Only PNG, JPG allowed','error');return;}if(f.size>5*1024*1024){notify('Max 5MB','error');return;}const prog=document.getElementById('logo-prog');if(prog){prog.classList.remove('hidden');}const fd=new FormData();fd.append('file',f);const r=await api('/setup/upload-logo',{method:'POST',body:fd});if(prog)prog.classList.add('hidden');if(r){notify('Logo uploaded ✓');companySetup={};await loadSetup();goto('setup');}}
async function uploadSig(){const f=document.getElementById('s-sig').files[0];if(!f){notify('Select image first','error');return;}const allowed=['image/png','image/jpeg','image/gif','image/webp'];if(!allowed.includes(f.type)){notify('Only PNG, JPG allowed','error');return;}const prog=document.getElementById('sig-prog');if(prog){prog.classList.remove('hidden');}const fd=new FormData();fd.append('file',f);const r=await api('/setup/upload-signature',{method:'POST',body:fd});if(prog)prog.classList.add('hidden');if(r){notify('Signature uploaded ✓');companySetup={};await loadSetup();goto('setup');}}

// ── FEATURE 2: PROJECT REPORT PDF ──────────────────────────
async function exportProjectReport(clientId){
  notify('Building project report... please wait','info');
  const data=await api('/quotations/project-report/'+clientId);
  if(!data){notify('Could not load project data','error');return;}

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const brand=companySetup.brand_name||'SAMVARDDH';
  const legal=companySetup.legal_name||'Samvarddh Associates Pvt. Ltd.';
  const web=companySetup.website||'www.samvarddh.com';
  const city=companySetup.city||'Bengaluru',state=companySetup.state||'Karnataka';
  const c=data.client;
  const s=data.summary;

  // Pre-load logo
  const logoB64=companySetup.logo_url?await loadImgB64(companySetup.logo_url):null;

  // Helper
  const addPageHeader=(title,pageNum)=>{
    doc.setFillColor(200,91,46);doc.rect(0,0,210,22,'F');
    if(logoB64){try{doc.addImage(logoB64,'JPEG',184,2,20,18);}catch(e){}}
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(255,255,255);
    doc.text(brand+' ASSOCIATES PVT. LTD.',14,10);
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);
    doc.text(web+' | '+city+', '+state,14,18);
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(200,91,46);
    doc.text(title.toUpperCase(),14,29);
    doc.setDrawColor(200,91,46);doc.setLineWidth(0.5);doc.line(14,31,196,31);
    doc.setTextColor(0,0,0);
  };

  // ════ PAGE 1: COVER PAGE ════
  // Left panel
  doc.setFillColor(58,35,18);doc.rect(0,0,78,297,'F');
  doc.setFillColor(74,46,21);doc.rect(0,0,78,95,'F');
  doc.setFillColor(52,31,12);doc.rect(0,95,78,55,'F');
  doc.setFillColor(68,42,17);doc.rect(0,150,78,85,'F');
  doc.setFillColor(45,26,9);doc.rect(0,235,78,62,'F');
  doc.setDrawColor(90,58,26);doc.setLineWidth(0.15);
  for(let ly=18;ly<280;ly+=11)doc.line(4,ly,74,ly);
  doc.setFillColor(243,232,218);doc.rect(0,276,78,21,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(6.5);doc.setTextColor(130,82,45);
  doc.text('www.samvarddh.com',39,286,'center');
  // Right panel
  doc.setFillColor(255,255,255);doc.rect(78,0,132,297,'F');
  doc.setFillColor(252,246,239);doc.rect(78,0,132,90,'F');
  // Logo
  if(logoB64){try{doc.addImage(logoB64,'JPEG',112,8,56,56);}catch(e){doc.setFillColor(200,91,46);doc.circle(152,30,20,'F');}}
  else{doc.setFillColor(200,91,46);doc.circle(152,34,22,'F');doc.setFillColor(252,246,239);doc.circle(145,28,16,'F');}
  doc.setFont('helvetica','bold');doc.setFontSize(16);doc.setTextColor(200,91,46);doc.text(brand,152,72,'center');
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(165,105,65);doc.text('E N R I C H I N G   L I V E S',152,79,'center');
  // Decorative arcs
  for(let ri=0;ri<=84;ri+=14){const r=30+ri;doc.setDrawColor(232-ri/3,190-ri/4,168-ri/4);doc.setLineWidth(1.0-ri/120);for(let s=0;s<24;s++){const a1=Math.PI*(0.55+s/24*0.5),a2=Math.PI*(0.55+(s+1)/24*0.5);doc.line(210+r*Math.cos(a1),20+r*Math.sin(a1),210+r*Math.cos(a2),20+r*Math.sin(a2));}}
  // Client info card
  doc.setFillColor(238,185,158);doc.roundedRect(83,105,122,140,9,9,'F');
  doc.setFillColor(200,91,46);doc.roundedRect(85,107,118,136,8,8,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(255,255,255);
  const coverRows=[['PROJECT REPORT',''],['CLIENT',c.client_name||''],['PROJECT',(c.project_type||'Residential')],['CITY',c.billing_address?.split(',').pop()?.trim()||city],['LEAD DESIGNER',c.lead_designer||'—'],['PROJECT MANAGER',c.project_manager||'—']];
  coverRows.forEach(([k,v],i)=>{
    const ry=128+i*20;
    doc.setFont('helvetica',i===0?'bold':'bold');doc.setFontSize(i===0?9:8.5);
    if(i===0){doc.setFontSize(11);doc.text(k,144,ry,'center');doc.setFont('helvetica','normal');doc.setFontSize(8);doc.text(new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'}),144,ry+10,'center');}
    else{doc.setFont('helvetica','bold');doc.text(k,90,ry);doc.text(':',146,ry);doc.setFont('helvetica','normal');doc.text((v||'—').slice(0,18),150,ry);}
  });
  doc.setFillColor(248,240,230);doc.rect(78,276,132,21,'F');
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(140,88,50);
  doc.text(city+', '+state,204,286,'right');

  // ════ PAGE 2: CLIENT DETAILS + PROJECT SUMMARY ════
  doc.addPage();addPageHeader('Client & Project Overview',2);
  let y=38;
  // Client details box
  doc.setFillColor(252,246,239);doc.roundedRect(14,y,86,80,5,5,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(200,91,46);doc.text('CLIENT DETAILS',18,y+8);
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(0,0,0);
  const clientDetails=[['Name',c.client_name],['Phone',c.phone||'—'],['Email',c.email||'—'],['GSTIN',c.gstin||'—'],['Project Type',c.project_type||'—'],['Referred By',c.referred_by||'—']];
  clientDetails.forEach(([k,v],i)=>{doc.setFont('helvetica','bold');doc.text(k+':',18,y+16+i*11);doc.setFont('helvetica','normal');doc.text(String(v||'—').slice(0,28),50,y+16+i*11);});
  // Project team box
  doc.setFillColor(240,248,255);doc.roundedRect(106,y,84,80,5,5,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(26,79,138);doc.text('PROJECT TEAM',110,y+8);
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(0,0,0);
  const teamDetails=[['Lead Designer',c.lead_designer||'—'],['Project Manager',c.project_manager||'—'],['Project Engineer',c.project_engineer||'—'],['Site Address',(c.site_address||'—').slice(0,22)],['Billing Address',(c.billing_address||'—').slice(0,22)]];
  teamDetails.forEach(([k,v],i)=>{doc.setFont('helvetica','bold');doc.text(k+':',110,y+16+i*11);doc.setFont('helvetica','normal');doc.text(String(v||'—').slice(0,18),146,y+16+i*11);});
  y+=90;
  // Financial summary
  doc.setFillColor(200,91,46);doc.roundedRect(14,y,182,44,5,5,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,255,255);
  const finCols=['Contract Value','Total Procurement','Revenue Collected','Balance Due','Gross Margin'];
  const finVals=[s.total_contract,s.total_procurement,s.total_received,s.balance,s.gross_margin];
  finCols.forEach((col,i)=>{const x=18+i*36;doc.setFont('helvetica','normal');doc.setFontSize(8);doc.text(col,x,y+8,{maxWidth:34});doc.setFont('helvetica','bold');doc.setFontSize(10);doc.text(Rs(finVals[i]),x,y+24);doc.setFont('helvetica','bold');doc.setFontSize(9);});
  y+=54;

  // ════ QUOTATIONS ════
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(200,91,46);doc.text('FINALISED QUOTATIONS',14,y);y+=5;doc.setLineWidth(0.5);doc.setDrawColor(200,91,46);doc.line(14,y,196,y);y+=5;
  data.quotations.forEach(q=>{
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(0,0,0);
    doc.text(q.quotation_number+' | '+fmtDate(q.quotation_date)+' | Approver: '+(q.approver_name||'—'),14,y);
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);
    doc.text('Project: '+(q.project_name||'—')+' | GST Type: '+(q.gst_type||'—')+' | Negotiated: '+Rs(q.negotiated_amount||0),14,y+7);
    y+=16;
    // Line items (first 8)
    const items=data.items_map[q.id]||[];
    if(items.length){
      doc.setFont('helvetica','bold');doc.setFontSize(7.5);
      const xs2=[14,55,95,115,125,135,148,175];
      ['Location','Element','L','B','H','Qty','Rate','Amount'].forEach((h,i)=>doc.text(h,xs2[i],y));y+=3;doc.line(14,y,196,y);y+=3;
      doc.setFont('helvetica','normal');
      items.slice(0,12).forEach(it=>{
        if(y>270){doc.addPage();addPageHeader('Quotation Details (cont.)',0);y=38;}
        [it.location,it.element,it.length_ft,it.breadth_ft,it.height_ft,it.qty?.toFixed(1),'Rs.'+Math.round(it.rate||0).toLocaleString('en-IN'),'Rs.'+Math.round(it.amount||0).toLocaleString('en-IN')].forEach((v,i)=>doc.text(String(v||'—').slice(0,16),xs2[i],y));y+=5;
      });
      if(items.length>12){doc.setFont('helvetica','italic');doc.setFontSize(7);doc.text(`... and ${items.length-12} more items`,14,y);y+=5;}
      doc.line(14,y,196,y);y+=3;
      doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.text('Grand Total:',150,y);doc.text('Rs.'+Math.round(q.negotiated_amount||0).toLocaleString('en-IN'),196,y,'right');y+=8;
    }
    if(y>250){doc.addPage();addPageHeader('Quotation (cont.)',0);y=38;}
  });

  // ════ DESIGN FILES ════
  if(data.design_files.length){
    if(y>240){doc.addPage();addPageHeader('Design Files',0);y=38;}
    else{y+=5;}
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(200,91,46);doc.text('DESIGN FILES',14,y);y+=5;doc.line(14,y,196,y);y+=5;
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(0,0,0);
    data.design_files.forEach(df=>{
      doc.setFont('helvetica','bold');doc.text('Version: '+(df.version||'—'),14,y);
      doc.text('Date: '+fmtDate(df.upload_date),80,y);
      doc.text('Designer: '+(df.designer_names||'—'),140,y);y+=6;
      if(df.notes){doc.setFont('helvetica','italic');doc.setFontSize(8);doc.text('Notes: '+df.notes,14,y);y+=5;doc.setFontSize(8.5);}
      if(df.drive_link){doc.setFont('helvetica','normal');doc.setTextColor(26,79,138);doc.text('Drive: '+df.drive_link.slice(0,60),14,y);doc.setTextColor(0,0,0);y+=6;}
      else{y+=2;}
    });
  }

  // ════ PROCUREMENT / EXPENSES ════
  if(data.procurement.length){
    if(y>220){doc.addPage();addPageHeader('Procurement & Expenses',0);y=38;}
    else{y+=8;}
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(200,91,46);doc.text('PROCUREMENT & EXPENSES',14,y);y+=5;doc.line(14,y,196,y);y+=5;
    doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(0,0,0);
    const px=[14,38,80,115,145,165,185];
    ['Date','Vendor/Employee','Item/Purpose','Category','Bill No','Amount','Status'].forEach((h,i)=>doc.text(h,px[i],y));y+=3;doc.line(14,y,196,y);y+=3;
    doc.setFont('helvetica','normal');
    data.procurement.forEach(p=>{
      if(y>275){doc.addPage();addPageHeader('Procurement (cont.)',0);y=38;doc.setFont('helvetica','normal');doc.setFontSize(7.5);}
      [(p.procurement_date||'').slice(0,10),(p.vendor_name||p.employee_name||'—').slice(0,18),(p.item_name||'—').slice(0,16),(p.category||'—').slice(0,12),p.bill_number||'—','Rs.'+Math.round(p.amount||0).toLocaleString('en-IN'),p.payment_status||'—'].forEach((v,i)=>doc.text(String(v),px[i],y));y+=5;
    });
    doc.line(14,y,196,y);y+=3;doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.text('Total Procurement: '+Rs(s.total_procurement),14,y);y+=8;
  }

  // ════ INVOICES & RECEIPTS ════
  if(data.invoices.length){
    if(y>220){doc.addPage();addPageHeader('Invoices & Receipts',0);y=38;}
    else{y+=8;}
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(200,91,46);doc.text('INVOICES & COLLECTIONS',14,y);y+=5;doc.line(14,y,196,y);y+=5;
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(0,0,0);
    data.invoices.forEach(inv=>{
      doc.setFont('helvetica','bold');doc.setFontSize(9);
      doc.text(`${inv.invoice_number} — ${inv.invoice_type} Invoice`,14,y);
      doc.text('Rs.'+Math.round(inv.total_amount||0).toLocaleString('en-IN'),196,y,'right');y+=6;
      doc.setFont('helvetica','normal');doc.setFontSize(8);
      doc.text('Date: '+fmtDate(inv.invoice_date)+' | Status: '+inv.status,14,y);y+=5;
      // Receipts for this invoice
      const recs=data.receipts_map[inv.id]||[];
      if(recs.length){
        doc.setFont('helvetica','italic');
        recs.forEach(r=>{doc.text('  Receipt: '+fmtDate(r.receipt_date)+' — '+r.mode+' — Rs.'+Math.round(r.amount).toLocaleString('en-IN')+(r.reference_number?' (Ref: '+r.reference_number+')':''),14,y);y+=4;});
      }
      y+=3;if(y>270){doc.addPage();addPageHeader('Invoices (cont.)',0);y=38;}
    });
    // Summary
    doc.setFont('helvetica','bold');doc.setFontSize(9);
    doc.text('Total Invoiced: '+Rs(s.total_invoiced||0),14,y);
    doc.text('Total Collected: '+Rs(s.total_received),100,y);
    doc.text('Balance: '+Rs(s.balance),180,y,'right');y+=8;
  }

  // ════ WORK PROGRESS / TIMELINE ════
  if(data.work_logs.length){
    if(y>210){doc.addPage();addPageHeader('Work Progress & Timeline',0);y=38;}
    else{y+=8;}
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(200,91,46);doc.text('WORK PROGRESS & TIMELINE',14,y);y+=5;doc.line(14,y,196,y);y+=5;
    doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(0,0,0);
    const wx=[14,55,95,130,158,185];
    ['Location','Task','Engineer','Target Date','Actual Date','Status'].forEach((h,i)=>doc.text(h,wx[i],y));y+=3;doc.line(14,y,196,y);y+=3;
    doc.setFont('helvetica','normal');
    data.work_logs.forEach(w=>{
      if(y>275){doc.addPage();addPageHeader('Timeline (cont.)',0);y=38;doc.setFont('helvetica','normal');doc.setFontSize(7.5);}
      [(w.location||'—').slice(0,18),(w.task||'—').slice(0,18),(w.project_engineer||'—').slice(0,14),fmtDate(w.target_date),fmtDate(w.actual_completion_date),w.status||'—'].forEach((v,i)=>doc.text(String(v),wx[i],y));y+=5;
    });
  }

  // ════ FINAL PAGE: SUMMARY ════
  doc.addPage();addPageHeader('Project Summary',0);y=38;
  doc.setFillColor(252,246,239);doc.roundedRect(14,y,182,100,6,6,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(200,91,46);doc.text('PROJECT SUMMARY',105,y+12,'center');
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(0,0,0);
  const summaryLines=[
    ['Contract Value (Negotiated)',Rs(s.total_contract)],
    ['Total Invoiced',Rs(s.total_invoiced||0)],
    ['Total Collected from Client',Rs(s.total_received)],
    ['Balance Receivable',Rs(s.balance)],
    ['Total Procurement / Expenses',Rs(s.total_procurement)],
    ['Gross Margin',Rs(s.gross_margin)],
    ['Margin %',s.total_contract>0?Math.round(s.gross_margin/s.total_contract*100)+'%':'—'],
  ];
  summaryLines.forEach(([k,v],i)=>{
    const sy2=y+25+i*12;
    if(i%2===0)doc.setFillColor(248,242,236);else doc.setFillColor(255,255,255);
    doc.rect(18,sy2-4,178,12,'F');
    doc.setFont('helvetica','bold');doc.text(k+':',22,sy2+4);
    doc.setFont('helvetica','normal');doc.setTextColor(i>=4&&i<=5?200:0,91*0,46*0);
    if(k==='Gross Margin')doc.setTextColor(s.gross_margin>0?45:163,s.gross_margin>0?122:45,s.gross_margin>0?45:45);
    doc.text(v,190,sy2+4,'right');doc.setTextColor(0,0,0);
  });
  y+=115;
  // Signature
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(120,120,120);
  doc.text('Report generated by '+brand+' Work-Space ERP | '+new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'}),105,y,'center');
  y+=8;
  const sigB64=companySetup.signature_url?await loadImgB64(companySetup.signature_url):null;
  if(sigB64){try{doc.addImage(sigB64,'PNG',140,y,40,15);}catch(e){try{doc.addImage(sigB64,'JPEG',140,y,40,15);}catch(e2){}}}
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(0,0,0);
  doc.line(130,y+18,196,y+18);doc.text('Authorised Signatory',163,y+23,'center');
  doc.text(brand+' ASSOCIATES PVT. LTD.',163,y+29,'center');
  if(companySetup.authorised_signatory)doc.text(companySetup.authorised_signatory,163,y+35,'center');

  doc.save('Samvarddh_ProjectReport_'+c.client_name.replace(/[^a-z0-9]/gi,'_')+'.pdf');
  notify('Project Report PDF exported ✓');
}

// ── BACKUP ──────────────────────────────────────────────────
async function pgBackup(){
  const bks=await api('/backup/list')||[];
  return`<div class="ph"><div class="ph-t">💾 Backup &amp; Data Safety</div></div>
  <div class="ab aw">⚠️ Never delete the samvarddh_data folder. It contains all your business data.</div>
  <div class="card" style="margin-top:14px"><div class="ct">Create Manual Backup</div>
  <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Creates a ZIP of database + all files. Do this before any update.</p>
  <button class="btn bp" onclick="createBkp()">💾 Create Backup Now</button></div>
  <div class="card"><div class="ct">Backup Files (${bks.length})</div><div class="tw"><table>
  <thead><tr><th>Filename</th><th>Size</th><th>Created</th><th>Download</th></tr></thead>
  <tbody>${bks.map(b=>`<tr><td class="fw">📦 ${b.name}</td><td>${b.size_mb} MB</td><td>${fmtDate(b.created)}</td><td><a href="${API}/backup/download/${b.name}" class="btn bo bsm" download>⬇ Download</a></td></tr>`).join('')||'<tr><td colspan="4" class="tc tm" style="padding:20px">No backups yet.</td></tr>'}</tbody></table></div></div>`;
}
async function createBkp(){const r=await api('/backup/create',{method:'POST'});if(r){notify('Backup created ✓');goto('backup');}}

// ── INIT ──────────────────────────────────────────────────
render();
