services:
  - type: web
    name: samvarddh-workspace
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /tmp/samvarddh_data
      - key: PYTHON_VERSION
        value: 3.11.0
